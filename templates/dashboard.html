<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeshCore Repeater Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>

  <header>
    <div class="header-title">
      <h1>MeshCore Repeater Monitor</h1>
      <div class="subtitle">LoRa Mesh Network Dashboard</div>
      <div class="header-meta">
        <div class="node-status">
          <span class="status-dot unknown" id="nodeDot"></span>
          <span id="nodeText">Node: --</span>
          <button id="pollToggleBtn" onclick="togglePolling()" style="display:none;margin-left:0.5rem;background:none;border:1px solid #334155;color:#94a3b8;font-size:0.72rem;padding:0.15rem 0.5rem;border-radius:4px;cursor:pointer;font-family:inherit" title="Toggle duty-cycle polling"></button>
        </div>
        <span class="header-meta-sep">&mdash;</span>
        <div class="conn-status">
          <span class="status-dot unknown" id="connDot"></span>
          <span id="connText">Connecting&hellip;</span>
          <span id="lastUpdate" class="conn-time">--</span>
        </div>
      </div>
    </div>
    <nav class="nav-group">
      <a href="/map" class="nav-btn" title="Network Map">Map</a>
      <a href="/messages" class="nav-btn" id="msgsNavLink" title="Messages">
        Messages<span id="msgsBadge" class="msgs-unread-dot" style="display:none"></span>
      </a>
      <a href="/packets" class="nav-btn" title="Recent Packets">Packets</a>
      <a href="/logs" class="nav-btn" title="Activity Logs">Logs</a>
      <button id="ntfyToggleBtn" class="nav-btn nav-ntfy-btn" onclick="toggleNtfy()" title="Toggle push notifications" style="display:none">&#9993;</button>
      <a href="/settings" class="nav-btn nav-settings" title="Settings">&#9881;</a>
    </nav>
  </header>

  <div class="grid" id="repeaterGrid">
    <div class="no-data">
      <h2>Connecting...</h2>
      <p>Waiting for the server to respond.</p>
    </div>
  </div>

  <!-- History Modal -->
  <div class="modal-overlay" id="historyModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="historyTitle">History</h2>
        <button class="modal-close" onclick="closeHistory()">&times;</button>
      </div>
      <canvas id="historyChart" height="250"></canvas>
    </div>
  </div>

  <!-- Logs Modal -->
  <div class="modal-overlay" id="logsModal">
    <div class="modal-content logs-panel">
      <div class="modal-header">
        <h2>Activity Logs</h2>
        <button class="modal-close" onclick="closeLogs()">&times;</button>
      </div>
      <div class="logs-controls">
        <div class="logs-filter-group">
          <label for="logHours">Show last</label>
          <select id="logHours" onchange="refreshLogs()">
            <option value="1">1 hour</option>
            <option value="6">6 hours</option>
            <option value="12">12 hours</option>
            <option value="24" selected>24 hours</option>
            <option value="48">48 hours</option>
            <option value="168">7 days</option>
          </select>
        </div>
        <div class="logs-filter-group">
          <label for="logLevel">Level</label>
          <select id="logLevel" onchange="refreshLogs()">
            <option value="">All</option>
            <option value="ERROR">Error</option>
            <option value="WARNING">Warning</option>
            <option value="INFO">Info</option>
          </select>
        </div>
        <button class="btn btn-secondary logs-refresh-btn" onclick="refreshLogs()">Refresh</button>
      </div>
      <div class="logs-retention-setting">
        <label for="logRetention">Auto-delete logs older than</label>
        <input type="number" id="logRetention" min="1" max="720" value="24">
        <span>hours</span>
        <button class="btn btn-secondary" onclick="saveLogRetention()">Save</button>
      </div>
      <div class="logs-table-wrap" id="logsTableWrap">
        <table class="logs-table">
          <thead>
            <tr>
              <th>Time</th>
              <th>Level</th>
              <th>Source</th>
              <th>Message</th>
            </tr>
          </thead>
          <tbody id="logsBody">
            <tr><td colspan="4" class="logs-empty">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/static/dashboard.js"></script>
</body>
</html>
